run:
  experiment_id: "test_run"
  project_name: "test-leanrl"
  logger_type : "mlflow"
  tracking_uri: "" 
  checkpoint_dir: "./unit_tests/results/checkpoints"
  training_gpus: 1
  rollout_gpus: 1
  ray_master_port: 29505
  seed: 42
  overlap_enabled: False
  weight_sync_method: "direct"
  checkpoint_save_interval: 1

train:
  alg_name: "sgrpo"
  optimizer_name: "adamw"
  lr: 1e-6
  adam_epsilon: 1e-8
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad_norm: 1.0
  lr_scheduler: "WarmupCosineLR"
  kl_coeff: 0.001
  clip_low: 0.2
  clip_high: 0.2
  entropy_coeff: 0.0
  update_after_full_replay: True
  total_number_of_epochs: 1
  train_steps_per_epoch: 1
  dynamic_ratio_every_step: False
  train_batch_size_per_gpu: 1
  gradient_accumulation_steps: 1
  val_batch_size_per_gpu: 1
  normalize_loss: True

reward:
  broadcast: False
  eps_reward_norm: 1e-8
  reward_func: dummy_reward_func

rollout:
  temperature: 1.0
  max_tokens: 128
  n_samples: 2
  top_p: 1.0
  top_k: -1
  gpu_memory_utilization: 0.5
  tensor_parallel_size: 1
  rollout_batch_size_per_gpu: 1
  rollout_samples_per_epoch: 2

model:
  name: "google/gemma-3-1b-it"
  dtype: "bfloat16"
  ref_model: "google/gemma-3-1b-it"
  ref_model_offload_to_cpu: True
  trust_remote_code: False
  model_class: "llm"
  gradient_checkpointing: True
  attn_implementation: "flash_attention_2"

peft:
  use_peft: False

data:
  train_ratios: {"train_rl": 1.0}
  train_files_path: ["unit_tests/data/train_rl.parquet"]
  val_files_path: ["unit_tests/data/val_rl.parquet"]
  num_workers: 0
  max_seq_len: 256
  prompt_key: "prompt"
  answer_key: "answer"
  solution_key: "solution"

deepspeed:
  zero_optimization:
    stage: 2
  steps_per_print: 1
  wall_clock_breakdown: false
