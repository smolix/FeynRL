run:
  project_name: "rasool-exp"
  logger_type : "mlflow" # mlflow or wandb
  tracking_uri: "" # e.g. "http://mymlflow.com:1234/"
  checkpoint_dir: "./ckps"
  training_gpus: 2
  rollout_gpus: 2
  ray_address: null #"auto" if it is the same node, otherwise run ray start --head --port=6379 and assign ray_address to "auto"
  # Port for torch distributed/deepspeed rendezvous.
  ray_master_port: 29500
  seed: 42

  # Weight sync: "direct" pushes weights via GPU memory (no disk I/O),
  # "disk" uses save-to-disk + vllm reload.
  weight_sync_method: "direct"
  # Save a disk checkpoint every N epochs for persistence/resumability.
  # 0 = only at end. Only applies when weight_sync_method="direct".
  checkpoint_save_interval: 1

  # NCCL config for multi-node training over InfiniBand.
  # Leave nccl_socket_ifname and nccl_ib_hca null for single-node or when NCCL auto-detection works.
  # Set nccl_socket_ifname to the network interface carrying inter-node traffic (e.g., "eth0", "bond0"). run ip addr | grep addr
  nccl_socket_ifname: null
  # Set nccl_ib_hca to the InfiniBand HCA device (e.g., "mlx5_0", "mlx5_0:1"). run ibstat | grep "CA '" to find it
  nccl_ib_hca: null
  # Port for NCCL weight sync rendezvous (default: ray_master_port + 100)
  nccl_sync_port: null
  # Backend for NCCL weight sync: "nccl" for gpu-to-gpu (fastes), "gloo" for cpu-based.
  nccl_sync_backend: "nccl"

  # Timeout settings (seconds) for ray.get() calls
  # need to be updated based on a specific setup
  init_timeout: 3600
  rollout_timeout: 3600
  train_step_timeout: 1800
  save_timeout: 1800
  sync_timeout: 900

overlap:
  # Overlap training and rollout generation
  enabled: False
  # Max training steps ahead of rollout policy version
  max_lag: 2
  # Dataloader batches per generation chunk.
  # One chunk in-flight at a time; smaller = more frequent NCCL sync windows.
  # 1 means max overlap, fastest ESS response. >1 means fewer round-trips, coarser sync.
  chunk_size: 1
  # ESS below this triggers sync between training steps (P3O only)
  # lower threshold means more acceptance of offpolicyiness.
  ess_sync_threshold: 0.5
  # Static sync interval in training steps for non-P3O algorithms regardless of off-policness of data.
  fixed_sync_interval: 1

train:
  ###############
  # optimizer related arguments
  ###############
  alg_name: "grpo" # options: grpo, cispo, ppo

  # The optimizer related arguments will be automatically copied to deepspeed config or others
  # distributed training frameworks. this way make it easier to handle them in one place and avoid any duplication.
  optimizer_name: "adamw"
  lr: 1e-5
  adam_epsilon: 1e-8
  betas: [0.9, 0.95]
  weight_decay: 0.01
  warmup_steps_ratio: 0.1
  clip_grad_norm: 1.0
  lr_scheduler: "WarmupCosineLR"

  # Specific policy arguments
  kl_coeff: 0.0
  clip_low: 0.2
  clip_high: 0.2
  entropy_coeff: 0.0
  update_after_full_replay: True

  # PPO-specific arguments or any method
  # that needs discount factors and tau for gae
  tau: null
  gamma: null
  # Value model. when null, inherits from policy.
  value_lr: null
  value_weight_decay: null
  value_clip_grad_norm: null

  ###############
  # general training loop arguments
  ###############
  # Here, an "epoch" is defined by a fixed number of training steps, not a full sweep of the dataset.
  # Each epoch processes: train_steps_per_epoch * global_batch_size samples.
  total_number_of_epochs: 30
  # number of training steps per epoch
  train_steps_per_epoch: 5
  # if True, we will recalculate the ratio of each dataset in every step
  dynamic_ratio_every_step: False

  ###############
  # Arguments which are common to both deepspeed or other distributed training frameworks and standalone training.
  # We keep them here in case with add other distributed training frameworks in the future.
  ###############
  # Note: train_batch_size_per_gpu is same as train_micro_batch_size_per_gpu in deepspeed.
  # batch size for sampling from the replay buffer during training.
  train_batch_size_per_gpu: 2
  # The ga will be canceled out algebraically when update_after_full_replay is True in grpo/cispo/etc.
  gradient_accumulation_steps: 1
  val_batch_size_per_gpu: 16

  # False: Uses sum of losses.
  normalize_loss: True

reward:
  broadcast: False
  eps_reward_norm: 1e-8
  reward_func: dummy_reward_func

rollout:
  temperature: 1.0
  # max number of tokens to generate per output sequence
  # note max_seq_len in data is the max total sequence length (prompt + response)
  max_tokens: 512
  n_samples: 8
  top_p: 1.0
  top_k: -1
  ignore_eos: False
  stop: ""
  gpu_memory_utilization: 0.5
  stop_token_ids: []
  prompt_logprobs: False
  force_strict_on_policy: True
  # if model fits on one GPU, set it to 1, otherwise increase it until fits.
  tensor_parallel_size: 1
  # Batch size for the prompt dataloader during rollout generation.
  rollout_batch_size_per_gpu: 2
  # Number of prompts to process per epoch.
  # Total samples in replay buffer = rollout_samples_per_epoch * n_samples.
  rollout_samples_per_epoch: 100
  # if true, it reduces throughput depending on model size and batch composition
  # because it forces batch-invariant kernels.
  # https://docs.vllm.ai/en/stable/examples/offline_inference/reproducibility/
  batch_invariant: False
  max_model_len: null

model:
  name: "google/gemma-3-1b-it"
  dtype: "bfloat16"
  ref_model: ""
  ref_model_offload_to_cpu: True
  trust_remote_code: False
  model_class: "llm"
  gradient_checkpointing: True
  # flash_attention_2 or eager
  attn_implementation: "flash_attention_2"
  # value model for ppo or any other algorithm that needs a value model
  value_model: ""

peft:
  use_peft: False
  peft_type: "lora"
  task_type: "CAUSAL_LM"
  lora_rank: 0
  lora_alpha: 0
  lora_dropout: 0
  lora_target_modules: null

data:
  train_ratios: {"dummy_train": 1.0}
  train_files_path: ["./dummy_train.parquet"]
  val_files_path: ["./dummy_test.parquet"]
  num_workers: 4
  max_seq_len: 512
  prompt_key: "prompt"
  answer_key: "answer"
  # Ground truth for reward calculation.
  solution_key: null

deepspeed:
  zero_optimization:
    # 0:Disabled, 1:OptState, 2:Opt+Grad, 3:Opt+Grad+Param
    stage: 3

    # Threshold for keeping small parameters on GPU. Default 1e8.
    # Prevents "thrashing" (constant PCIe transfer) for small layers (like LayerNorm).
    stage3_param_persistence_threshold: 100000.0

    # Controls how much data is pre-fetched from CPU to GPU.
    # Larger = faster but more VRAM.
    stage3_prefetch_bucket_size: 50000000.0

    # --- CPU Offloading ---
    # Offload optimizer to CPU. Use "none" if GPU VRAM suffices.
    offload_optimizer:
      device: "none"
      pin_memory: true

    # Offload params to CPU. High performance penalty; use "none" if possible.
    offload_param:
      device: "none"
      pin_memory: true

    # --- Communication ---
    # Reduces fragmentation by copying gradients to contiguous buffer
    contiguous_gradients: true

    # Attempts to overlap the reduction (communication) of gradients
    # with the backward pass computation. Boosts speed.
    overlap_comm: true

    # In ZeRO, "reduce scatter" is how gradients are averaged and scattered
    # to the specific GPU responsible for updating that specific weight.
    reduce_scatter: true

    # --- Tuning Knobs ---
    # Controls the size of the chunks of data sent between GPUs.
    # Larger = higher bandwidth efficiency but higher peak memory usage.
    # 5e8 (500MB) is a standard aggressive default.
    reduce_bucket_size: 500000000.0
    allgather_bucket_size: 500000000.0

    # --- Saving / Checkpointing ---
    # If true, gathers the fragmented ZeRO-3 weights into a single FP16 file when saving
    stage3_gather_16bit_weights_on_model_save: true

  # --- Logging ---
  steps_per_print: 100
  # If true, prints a detailed timing breakdown of fwd/bwd/step time.
  # Useful for debugging speed, but noisy.
  wall_clock_breakdown: false

  # Measure Model Flops Utilization
  flops_profiler:
    enabled: false
    profile_step: 10
    module_depth: -1
    top_modules: 1
    detailed: true
    output_file: null